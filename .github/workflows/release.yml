name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mod_version:
        description: 'Versão do mod (ex.: 0.6.0)'
        required: true
        default: '0.6.2'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Fetch compile-only libs
        run: bash scripts/ci-setup-libs.sh

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mod_version=${{ inputs.mod_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "mod_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate CurseForge secrets and project
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        run: |
          TOKEN="$(echo -n "$CURSEFORGE_TOKEN" | tr -d '\r\n' | sed 's/^["'\'']//;s/["'\'']$//')"
          PROJECT_ID="$(echo -n "$CURSEFORGE_PROJECT_ID" | tr -d '[:space:]')"
          if [ -z "$TOKEN" ] || [ -z "$PROJECT_ID" ]; then
            echo "::error::Defina CURSEFORGE_TOKEN e CURSEFORGE_PROJECT_ID em Settings > Secrets and variables > Actions."
            exit 1
          fi
          echo "CurseForge project ID (secret): $PROJECT_ID"
          echo "Token length: ${#TOKEN} chars"
          HTTP=$(curl -sS -o /tmp/cf-project.json -w "%{http_code}" \
            -H "x-api-key: $TOKEN" \
            -H "Accept: application/json" \
            "https://api.curseforge.com/v1/mods/$PROJECT_ID")
          echo "CurseForge project lookup: HTTP $HTTP"
          if [ "$HTTP" != "200" ]; then
            cat /tmp/cf-project.json
            echo ""
            if [ "$HTTP" = "403" ]; then
              echo "::error::403 Forbidden — token invalido, secret com aspas/espacos, PROJECT_ID errado (esperado: 1580917), ou conta sem acesso ao projeto. Gere o token em https://console.curseforge.com/ e confira que a conta e dona do mod."
            else
              echo "::error::Token ou PROJECT_ID invalido. O ID e numerico (barra lateral do projeto na CurseForge)."
            fi
            exit 1
          fi
          jq -r '"Projeto: \(.data.name) (\(.data.slug)) id=\(.data.id)"' /tmp/cf-project.json

      - name: Build and publish to CurseForge
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CHANGELOG: "Release ${{ steps.version.outputs.mod_version }} - see docs/MANIFESTO.md for progression details."
        run: |
          chmod +x gradlew
          ./gradlew --no-configuration-cache build publishCurseforge --stacktrace -Pmod_version=${{ steps.version.outputs.mod_version }}
