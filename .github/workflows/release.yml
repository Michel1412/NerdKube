name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      mod_version:
        description: 'Versão do mod (ex.: 0.6.0)'
        required: true
        default: '0.6.2'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Fetch compile-only libs
        run: |
          bash scripts/ci-setup-libs.sh
          ls -la libs/

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mod_version=${{ inputs.mod_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "mod_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate CurseForge secrets and project
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
        run: bash scripts/curseforge-validate.sh

      - name: Build and publish to CurseForge
        env:
          CHANGELOG: "Release ${{ steps.version.outputs.mod_version }} - see docs/MANIFESTO.md for progression details."
        run: |
          chmod +x gradlew
          ./gradlew --no-configuration-cache build publishCurseforge --stacktrace -Pmod_version=${{ steps.version.outputs.mod_version }}
