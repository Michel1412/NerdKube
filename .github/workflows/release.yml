name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Fetch compile-only libs
        run: bash scripts/ci-setup-libs.sh

      - name: Resolve version from tag
        id: version
        run: echo "mod_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: chmod +x gradlew && ./gradlew build -Pmod_version=${{ steps.version.outputs.mod_version }}

      - name: Publish to CurseForge
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
          CURSEFORGE_PROJECT_ID: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          CHANGELOG: "Release ${{ github.ref_name }} — see repository tags and docs/MANIFESTO.md for progression details."
        run: ./gradlew publishCurseforge -Pmod_version=${{ steps.version.outputs.mod_version }}
